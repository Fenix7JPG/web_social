<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Multiplayer</title>
  <style>
    body { margin: 0; background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: Arial, sans-serif; color: white; }
    canvas { border: 2px solid #e94560; background: #16213e; }
    #status { margin-top: 10px; color: #aaa; font-size: 0.85rem; }
    #info { margin-bottom: 10px; color: #aaa; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div id="info">Usá WASD o las flechas para moverte</div>
  <canvas id="canvas" width="600" height="400"></canvas>
  <div id="status">⚪ Conectando...</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // Colores para distinguir jugadores
    const COLORS = ['#e94560', '#0f9b8e', '#f5a623', '#7b68ee', '#50fa7b'];

    let myId = null;
    let myPlayer = { x: 100, y: 100 };
    let otherPlayers = {}; // { id: { x, y } }
    let colorMap = {};     // { id: color }
    let colorIndex = 0;

    // Teclado
    const keys = {};
    window.addEventListener('keydown', e => keys[e.key] = true);
    window.addEventListener('keyup',   e => keys[e.key] = false);

    const SPEED = 3;
    const SIZE  = 32;

    // WebSocket — cambiá localhost por tu URL de Render
    const socket = new WebSocket('ws://localhost:3000');

    socket.onopen = () => {
      document.getElementById('status').textContent = '🟢 Conectado';
    };

    socket.onclose = () => {
      document.getElementById('status').textContent = '🔴 Desconectado';
    };

    socket.onmessage = (event) => {
      const data = JSON.parse(event.data);

      if (data.type === 'init') {
        myId = data.id;
        colorMap[myId] = COLORS[colorIndex++ % COLORS.length];

        // Cargar jugadores que ya estaban
        for (let id in data.players) {
          if (id !== myId) {
            otherPlayers[id] = data.players[id];
            colorMap[id] = COLORS[colorIndex++ % COLORS.length];
          }
        }
      }

      if (data.type === 'playerJoined') {
        otherPlayers[data.id] = { x: data.x, y: data.y };
        colorMap[data.id] = COLORS[colorIndex++ % COLORS.length];
      }

      if (data.type === 'playerMove') {
        if (otherPlayers[data.id]) {
          otherPlayers[data.id].x = data.x;
          otherPlayers[data.id].y = data.y;
        }
      }

      if (data.type === 'playerLeft') {
        delete otherPlayers[data.id];
        delete colorMap[data.id];
      }
    };

    // Game loop
    function gameLoop() {
      // Mover mi jugador
      if (keys['w'] || keys['ArrowUp'])    myPlayer.y -= SPEED;
      if (keys['s'] || keys['ArrowDown'])  myPlayer.y += SPEED;
      if (keys['a'] || keys['ArrowLeft'])  myPlayer.x -= SPEED;
      if (keys['d'] || keys['ArrowRight']) myPlayer.x += SPEED;

      // Mantener dentro del canvas
      myPlayer.x = Math.max(0, Math.min(canvas.width  - SIZE, myPlayer.x));
      myPlayer.y = Math.max(0, Math.min(canvas.height - SIZE, myPlayer.y));

      // Mandar posición al servidor
      if (socket.readyState === WebSocket.OPEN) {
        socket.send(JSON.stringify({ type: 'move', x: myPlayer.x, y: myPlayer.y }));
      }

      // Dibujar
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Dibujar otros jugadores
      for (let id in otherPlayers) {
        const p = otherPlayers[id];
        ctx.fillStyle = colorMap[id] || '#fff';
        ctx.fillRect(p.x, p.y, SIZE, SIZE);
        ctx.fillStyle = 'white';
        ctx.font = '11px Arial';
        ctx.fillText('Jugador', p.x, p.y - 5);
      }

      // Dibujar MI jugador (encima de todos)
      if (myId) {
        ctx.fillStyle = colorMap[myId] || '#e94560';
        ctx.fillRect(myPlayer.x, myPlayer.y, SIZE, SIZE);
        ctx.fillStyle = 'white';
        ctx.font = 'bold 11px Arial';
        ctx.fillText('Tú', myPlayer.x + 8, myPlayer.y - 5);
      }

      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
